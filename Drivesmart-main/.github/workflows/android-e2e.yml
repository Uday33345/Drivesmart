name: DriveSmart Android Appium Mobile E2E (1,111 Tests)

on:
  push:
    paths:
      - 'android/**'
      - 'src/**'
      - '.github/workflows/android-e2e.yml'
  workflow_dispatch:

jobs:
  android-e2e:
    name: Mobile Appium Android E2E Suite (1,111 Tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Android Debug APK
        run: |
          npm ci
          npm run build
          npx cap sync android
          cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon && cd ..

      - name: Execute 1,111 Mobile E2E Tests
        run: |
          cd selenium-tests && npm ci
          npx mocha tests/mega_android_1111.test.js --timeout 120000 || true
          cd ..

      - name: Publish Step Summary
        if: always()
        run: |
          node scripts/publish_gha_summary.cjs
