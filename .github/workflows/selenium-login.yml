name: DriveSmart E2E Selenium CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Install Selenium Test Dependencies
        working-directory: ./selenium-tests
        run: npm install

      - name: Start App and Run E2E Tests
        run: |
          # Start the dev server in the background of the same shell session
          npm run dev &
          # Wait for the server to be active (timeout 60s)
          npx wait-on http://localhost:5173 --timeout 60000
          # Navigate and execute Mocha test suite
          cd selenium-tests
          npm test

      - name: Install Python dependencies
        run: |
          pip install openpyxl

      - name: Generate Quality Excel Report in CI
        run: |
          python generate_report.py

      - name: Upload Excel Test Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: E2E-Test-Report-DriveSmart
          path: E2E_Test_Report_DriveSmart_*.xlsx
